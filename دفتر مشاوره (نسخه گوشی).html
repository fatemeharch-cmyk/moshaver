document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 style=\"min-height:100vh; font-family:'Vazirmatn',sans-serif; color:#3A2E2A;\">\n\n  <!-- ======= Header / Nav ======= -->\n  <header class=\"no-print\" style=\"background:#fff; border-bottom:3px solid #2E9E6B; position:sticky; top:0; z-index:10;\">\n    <div style=\"max-width:1060px; margin:0 auto; padding:14px 20px; display:flex; align-items:center; gap:16px; flex-wrap:wrap;\">\n      <div style=\"display:flex; align-items:center; gap:12px;\">\n        <div style=\"width:42px; height:42px; border-radius:12px; background:#2E9E6B; color:#fff; display:grid; place-items:center; font-weight:900; font-size:20px;\">م<\u002Fdiv>\n        <div>\n          <div style=\"font-weight:900; font-size:17px;\">دفتر مشاوره مسئول پایه<\u002Fdiv>\n          <div class=\"brandsub\" style=\"font-size:12px; color:#8A7A70;\">{{ schoolName }} · پایه یازدهم تجربی<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <nav class=\"topnav\" style=\"display:flex; gap:8px; margin-inline-start:auto; flex-wrap:wrap;\">\n        <button onclick=\"{{ goDash }}\" style=\"border:none; cursor:pointer; font-family:inherit; font-size:14px; font-weight:700; padding:9px 16px; border-radius:999px; background:{{ navDashBg }}; color:{{ navDashFg }};\">میز کار<\u002Fbutton>\n        <button onclick=\"{{ goStudents }}\" style=\"border:none; cursor:pointer; font-family:inherit; font-size:14px; font-weight:700; padding:9px 16px; border-radius:999px; background:{{ navStuBg }}; color:{{ navStuFg }};\">دانش‌آموزان<\u002Fbutton>\n        <button onclick=\"{{ goReport }}\" style=\"border:none; cursor:pointer; font-family:inherit; font-size:14px; font-weight:700; padding:9px 16px; border-radius:999px; background:{{ navRepBg }}; color:{{ navRepFg }};\">گزارش ماهانه<\u002Fbutton>\n        <button onclick=\"{{ goNew }}\" style=\"border:none; cursor:pointer; font-family:inherit; font-size:14px; font-weight:900; padding:9px 20px; border-radius:999px; background:#2A9D8F; color:#fff; box-shadow:0 3px 0 #1F776D;\">+ ثبت جلسه<\u002Fbutton>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main class=\"appmain\" style=\"max-width:1060px; margin:0 auto; padding:24px 20px 80px;\">\n\n    <!-- ======= Dashboard ======= -->\n    <sc-if value=\"{{ isDash }}\" hint-placeholder-val=\"{{ true }}\">\n      <section data-screen-label=\"میز کار\">\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px;\">\n          <div style=\"background:#fff; border-radius:16px; padding:18px; border:1px solid #F3E3D3;\">\n            <div style=\"font-size:13px; color:#8A7A70; font-weight:700;\">جلسات ۷ روز اخیر<\u002Fdiv>\n            <div style=\"font-size:34px; font-weight:900; color:#F2695C;\">{{ weekCount }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff; border-radius:16px; padding:18px; border:1px solid #F3E3D3;\">\n            <div style=\"font-size:13px; color:#8A7A70; font-weight:700;\">جلسات ۳۰ روز اخیر<\u002Fdiv>\n            <div style=\"font-size:34px; font-weight:900; color:#2A9D8F;\">{{ monthCount }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff; border-radius:16px; padding:18px; border:1px solid #F3E3D3;\">\n            <div style=\"font-size:13px; color:#8A7A70; font-weight:700;\">نیازمند پیگیری<\u002Fdiv>\n            <div style=\"font-size:34px; font-weight:900; color:#E15554;\">{{ followCount }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff; border-radius:16px; padding:18px; border:1px solid #F3E3D3;\">\n            <div style=\"font-size:13px; color:#8A7A70; font-weight:700;\">کل دانش‌آموزان<\u002Fdiv>\n            <div style=\"font-size:34px; font-weight:900; color:#F4B942;\">{{ studentCount }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:16px; margin-top:18px; align-items:start;\">\n          <!-- follow-ups -->\n          <div style=\"background:#fff; border-radius:16px; border:1px solid #F3E3D3; overflow:hidden;\">\n            <div style=\"padding:14px 18px; font-weight:900; font-size:15px; background:#FDEBE4; color:#C2432F;\">پیگیری‌های باز<\u002Fdiv>\n            <sc-if value=\"{{ hasFollowUps }}\" hint-placeholder-val=\"{{ true }}\">\n              <sc-for list=\"{{ followUps }}\" as=\"f\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex; align-items:center; gap:12px; padding:12px 18px; border-top:1px solid #FBF0E6;\">\n                  <div style=\"flex:1; min-width:0;\">\n                    <a href=\"#\" onclick=\"{{ f.open }}\" style=\"font-weight:800; font-size:14px; color:#3A2E2A; text-decoration:none;\">{{ f.name }}<\u002Fa>\n                    <div style=\"font-size:12px; color:#8A7A70;\">{{ f.topic }} · {{ f.dateFa }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <button onclick=\"{{ f.resolve }}\" style=\"border:1px solid #2A9D8F; color:#2A9D8F; background:#fff; border-radius:999px; padding:5px 14px; font-family:inherit; font-size:12px; font-weight:700; cursor:pointer;\">انجام شد ✓<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noFollowUps }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:24px 18px; font-size:13px; color:#8A7A70;\">پیگیری بازی وجود ندارد. آفرین!<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <!-- top topics -->\n          <div style=\"background:#fff; border-radius:16px; border:1px solid #F3E3D3; overflow:hidden;\">\n            <div style=\"padding:14px 18px; font-weight:900; font-size:15px; background:#E7F4F1; color:#1F776D;\">موضوعات پرتکرار (۳۰ روز)<\u002Fdiv>\n            <div style=\"padding:14px 18px; display:flex; flex-direction:column; gap:12px;\">\n              <sc-for list=\"{{ topTopics }}\" as=\"t\" hint-placeholder-count=\"4\">\n                <div>\n                  <div style=\"display:flex; justify-content:space-between; font-size:13px; font-weight:700; margin-bottom:4px;\">\n                    <span>{{ t.label }}<\u002Fspan><span style=\"color:#8A7A70;\">{{ t.countFa }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"height:10px; border-radius:999px; background:#FBF0E6;\">\n                    <div style=\"height:10px; border-radius:999px; background:#F4B942; width:{{ t.pct }}%;\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- recent sessions -->\n        <div style=\"background:#fff; border-radius:16px; border:1px solid #F3E3D3; margin-top:18px; overflow:hidden;\">\n          <div style=\"padding:14px 18px; font-weight:900; font-size:15px; border-bottom:1px solid #FBF0E6;\">آخرین جلسات<\u002Fdiv>\n          <sc-for list=\"{{ recentSessions }}\" as=\"s\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex; align-items:center; gap:12px; padding:12px 18px; border-top:1px solid #FBF0E6;\">\n              <span style=\"width:12px; height:12px; border-radius:50%; background:{{ s.moodColor }}; flex-shrink:0;\" title=\"{{ s.moodLabel }}\"><\u002Fspan>\n              <div style=\"flex:1; min-width:0;\">\n                <a href=\"#\" onclick=\"{{ s.open }}\" style=\"font-weight:800; font-size:14px; color:#3A2E2A; text-decoration:none;\">{{ s.name }}<\u002Fa>\n                <div style=\"font-size:12px; color:#8A7A70;\">{{ s.typeLabel }} · {{ s.topicsText }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:12px; color:#8A7A70; flex-shrink:0;\">{{ s.dateFa }}<\u002Fdiv>\n              <button onclick=\"{{ s.sheet }}\" style=\"border:1px solid #F2695C; color:#F2695C; background:#fff; border-radius:999px; padding:5px 14px; font-family:inherit; font-size:12px; font-weight:700; cursor:pointer; flex-shrink:0;\">کاربرگ<\u002Fbutton>\n ">{{ stuInitial }}<\u002Fdiv>\n            <div style=\"flex:1;\">\n              <div style=\"font-weight:900; font-size:20px;\">{{ stuName }}<\u002Fdiv>\n              <div style=\"font-size:13px; color:#8A7A70;\">پایه یازدهم تجربی · {{ stuCountFa }} جلسه ثبت‌شده<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"text-align:center;\">\n              <div style=\"font-size:11px; color:#8A7A70; font-weight:700; margin-bottom:5px;\">روند حال دانش‌آموز (قدیم ← جدید)<\u002Fdiv>\n              <div style=\"display:flex; gap:5px; justify-content:center;\">\n                <sc-for list=\"{{ stuMoodDots }}\" as=\"d\" hint-placeholder-count=\"5\">\n                  <span style=\"width:16px; height:16px; border-radius:50%; background:{{ d.color }};\" title=\"{{ d.label }}\"><\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ stuHasReport }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#fff; border-radius:16px; border:1px solid #E7E0F0; overflow:hidden; margin-bottom:16px;\">\n            <div style=\"background:#F3EDFB; padding:14px 18px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;\">\n              <div style=\"font-weight:900; font-size:15px; color:#6B4FA8;\">📊 گزارش جامع تحلیل شیوه مطالعه<\u002Fdiv>\n              <div style=\"font-size:12px; color:#8E6CC9; font-weight:700;\">🎯 {{ stuReportGoal }} · ⭐ {{ stuReportStatus }}<\u002Fdiv>\n              <button onclick=\"{{ toggleReport }}\" style=\"margin-inline-start:auto; border:none; cursor:pointer; font-family:inherit; font-size:13px; font-weight:800; padding:8px 18px; border-radius:999px; background:#8E6CC9; color:#fff;\">{{ reportToggleLabel }}<\u002Fbutton>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ showReport }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:18px; display:flex; flex-direction:column; padding:10px 14px; font-size:13px; display:flex; flex-direction:column; gap:6px;\">\n                <div><span style=\"color:#8A9A8E;\">نام و نام خانوادگی: <\u002Fspan><b>{{ sheetStudent }}<\u002Fb><\u002Fdiv>\n                <div><span style=\"color:#8A9A8E;\">کلاس / رشته: <\u002Fspan><b>یازدهم تجربی<\u002Fb><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff; border:1px solid #D3E5F2; border-radius:14px; overflow:hidden;\">\n              <div style=\"background:#EAF3FB; color:#3D7EB8; font-weight:900; font-size:13px; padding:8px 14px; display:flex; align-items:center; gap:7px;\"><span>🗓️<\u002Fspan>اطلاعات جلسه<\u002Fdiv>\n              <div style=\"padding:10px 14px; font-size:13px; display:flex; flex-direction:column; gap:6px;\">\n                <div><span style=\"color:#8A9A8E;\">روز و تاریخ: <\u002Fspan><b>{{ sheetDateFa }}<\u002Fb><\u002Fdiv>\n                <div><span style=\"color:#8A9A8E;\">نوع جلسه: <\u002Fspan><b>{{ sheetType }}<\u002Fb><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff; border:1px solid #F5DADA; border-radius:14px; overflow:hidden;\">\n              <div style=\"background:#FDECEC; color:#C25555; font-weight:900; font-size:13px; padding:8px 14px; display:flex; align-items:center; gap:7px;\"><span>🔖<\u002Fspan>شماره کاربرگ و وضعیت<\u002Fdiv>\n              <div style=\"padding:10px 14px; font-size:13px; display:flex; flex-direction:column; gap:6px;\">\n                <div><span style=\"color:#8A9A8E;\">شماره: <\u002Fspan><b>{{ sheetNo }}<\u002Fb><\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:7px;\"><span style=\"color:#8A9A8E;\">حال دانش‌آموز:<\u002Fspan><span style=\"width:11px; height:11px; border-radius:50%; background:{{ sheetMoodColor }};\"><\u002Fspan><b>{{ sheetMood }}<\u002Fb><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ sheetHasRatings }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:relative; background:#fff; border:1px solid #D3E5F2; border-radius:14px; overflow:hidden; margin-top:14px;\">\n              <div style=\"background:#EAF3FB; color:#3D7EB8; font-weight:900; font-size:13px; padding:8px 14px; display:flex; align-items:center; gap:7px;\"><span>⭐<\u002Fspan>وضعیت فعلی دانش‌آموز <span style=\"font-weight:400; font-size:11px;\">(از ۱ تا ۵)<\u002Fspan><\u002Fdiv>\n              <div style=\"padding:12px 14px; display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px;\">\n                <sc-for list=\"{{ sheetRatings }}\" as=\"r\" hint-placeholder-count=\"5\">\n                  <div style=\"text-align:center; background:#FAFCFE; border:1px solid #E3EEF7; border-radius:12px; padding:8px 6px;\">\n                    <div style=\"font-size:12px; font-weight:800; margin-bottom:3px;\">{{ r.label }}<\u002Fdiv>\n                    <div style=\"display:flex; gap:1px; justify-content:center; direction:ltr;\">\n                      <sc-for list=\"{{ r.stars }}\" as=\"s\" hint-placeholder-count=\"5\">\n                        <span style=\"font-size:16px; color:{{ s.color }};\">{{ s.ch }}<\u002Fspan>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"position:relative; background:#fff; border:1px solid #D9EDE0; border-radius:14px; overflow:hidden; margin-top:14px;\">\n            <div style=\"background:#E9F5EC; color:#2E7D53; font-weight:900; font-size:13px; padding:8px 14px; display:flex; align-items:center; gap:7px;\"><span>💬<\u002Fspan>موضوعات مطرح‌شده در جلسه<\u002Fdiv>\n            <div style=\"padding:12px 14px; display:flex; gap:8px; flex-wrap:wrap;\">\n              <sc-for list=\"{{ sheetTopics }}\" as=\"t\" hint-placeholder-count=\"3\">\n                <span style=\"font-size:13px; font-weight:700; background:#F2FAF4; border:1.5px solid #8FCCA5; color:#2E7D53; border-radius:12px; padding:6px 16px;\">{{ t.label }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"position:relative; background:#fff; border:1px solid #D3E5F2; border-radius:14px; overflow:hidden; margin-top:14px;\">\n            <div style=\"background:#EAF3FB; color:#3D7EB8; font-weight:900; font-size:13px; padding:8px 14px; display:flex; align-items:center; gap:7px;\"><span>📋<\u002Fspan>اقدامات و توافقات انجام‌شده<\u002Fdiv>\n            <div style=\"padding:12px 14px; display:flex; flex-direction:column; gap:6px;\">\n              <sc-for list=\"{{ sheetActions }}\" as=\"a\" hint-placeholder-count=\"2\">\n                <div style=\"font-size:13px; display:flex; gap:9px; align-items:center;\"><span style=\"width:16px; height:16px; border:2px solid #3D7EB8; border-radius:5px; display:grid; place-items:center; font-size:11px; color:#3D7EB8; font-weight:900; flex-shrink:0;\">✓<\u002Fspan>{{ a.label }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ sheetHasGrades }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:relative; background:#fff; border:1px solid #F0E3C8; border-radius:14px; overflow:hidden; margin-top:14px;\">\n              <div style=\"background:#FFF6DC; color:#B08514; font-weight:900; font-size:13px; padding:8px 14px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;\"><span>📊<\u002Fspan>وضعیت درسی — مقایسه با میانگین کلاس\n                <span style=\"display:flex; gap:12px; margin-inline-start:auto; font-size:11px; font-weight:700; color:#6B5B52; flex-wrap:wrap;\">\n                  <span style=\"display:flex; align-items:center; gap:4px;\"><span style=\"width:10px; height:10px; border-radius:3px; background:#2E9E6B;\"><\u002Fspan>دانش‌آموز<\u002Fspan>\n                  <span style=\"display:flex; align-items:center; gap:4px;\"><span style=\"width:10px; height:10px; border-radius:3px; background:#F4B942;\"><\u002Fspan>میانگین کلاس<\u002Fspan>\n                  <span style=\"display:flex; align-items:center; gap:4px;\"><span style=\"width:10px; height:10px; border-radius:3px; background:#8E6CC9;\"><\u002Fspan>بالاترین کلاس<\u002Fspan>\n                <\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"padding:12px 14px; display:flex; flex-direction:column; gap:8px;\">\n                <sc-for list=\"{{ sheetGradeRows }}\" as=\"g\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex; align-items:center; gap:10px;\">\n                    <div style=\"width:60px; font-size:12px; font-weight:800; flex-shrink:0;\">{{ g.subject }}<\u002Fdiv>\n                    <div style=\"flex:1; display:flex; flex-direction:column; gap:3px;\">\n                      <div style=\"display:flex; align-items:center; gap:6px;\">\n                        <div style=\"flex:1; height:9px; border-radius:999px; background:#F2F6F0;\"><div style=\"height:9px; border-radius:999px; background:#2E9E6B; width:{{ g.sPct }}%;\"><\u002Fdiv><\u002Fdiv>\n                        <div style=\"width:38px; font-size:11px; font-weight:800; color:#2E7D53;\">{{ g.sVal }}<\u002Fdiv>\n                      <\u002Fdiv>\n                      <div style=\"display:flex; align-items:center; gap:6px;\">\n                        <div style=\"flex:1; height:9px; border-radius:999px; background:#F2F6F0;\"><div style=\"height:9px; border-radius:999px; background:#F4B942; width:{{ g.cPct }}%;\"><\u002Fdiv><\u002Fdiv>\n                        <div style=\"width:38px; font-size:11px; font-weight:800; color:#B08514;\">{{ g.cVal }}<\u002Fdiv>\n                      <\u002Fdiv>\n                      <div style=\"display:flex; align-items:center; gap:6px;\">\n                        <div style=\"flex:1; height:9px; border-radius:999px; background:#F2F6F0;\"><div style=\"height:9px; border-radius:999px; background:#8E6CC9; width:{{ g.tPct }}%;\"><\u002Fdiv><\u002Fdiv>\n                        <div style=\"width:38px; font-size:11px; font-weight:800; color:#8E6CC9;\">{{ g.tVal }}<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"width:56px; font-size:10px; color:#8A9A8E; flex-shrink:0;\">{{ g.examCountFa }} آزمون<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"position:relative; background:#fff; border:1px solid #D9EDE0; border-radius:14px; overflow:hidden; margin-top:14px;\">\n            <div style=\"background:#E9F5EC; color:#2E7D53; font-weight:900; font-size:13px; padding:8px 14px; display:flex; align-items:center; gap:7px;\"><span>✏️<\u002Fspan>توضیحات تکمیلی مسئول پایه<\u002Fdiv>\n            <div style=\"padding:12px 16px; font-size:13px; min-height:56px; line-height:2.6; background:repeating-linear-gradient(to bottom, transparent, transparent 33px, #E4EFE7 33px, #E4EFE7 34px);\">{{ sheetNote }}<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"position:relative; background:#fff; border:1px solid #E7E0F0; border-radius:14px; overflow:hidden; margin-top:14px;\">\n            <div style=\"background:#F3EDFB; color:#8E6CC9; font-weight:900; font-size:13px; padding:8px 14px; display:flex; align-items:center; gap:7px;\"><span>🤖<\u002Fspan>تحلیل و پیشنهادات <span style=\"font-weight:400; font-size:11px;\">(تحلیل هوشمند)<\u002Fspan><\u002Fdiv>\n            <div style=\"padding:12px 14px; display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:10px;\">\n              <div style=\"background:#FFF9EB; border:1px solid #F0E3C8; border-radius:12px; padding:10px 14px;\">\n                <div style=\"font-size:12px; font-weight:900; color:#B08514; margin-bottom:6px;\">⚠️ چالش‌ها و نکات قابل توجه<\u002Fdiv>\n                <sc-for list=\"{{ sheetAnalysis.challenges }}\" as=\"c\" hint-placeholder-count=\"1\">\n                  <div style=\"font-size:12px; line-height:1.9; margin-bottom:4px;\">{{ c.t }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"background:#F2FAF4; border:1px solid #D9EDE0; border-radius:12px; padding:10px 14px;\">\n                <div style=\"font-size:12px; font-weight:900; color:#2E7D53; margin-bottom:6px;\">➕ نقاط قوت<\u002Fdiv>\n                <sc-for list=\"{{ sheetAnalysis.strengths }}\" as=\"c\" hint-placeholder-count=\"1\">\n                  <div style=\"font-size:12px; line-height:1.9; margin-bottom:4px;\">{{ c.t }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"background:#F8F4FD; border:1px solid #E7E0F0; border-radius:12px; padding:10px 14px;\">\n                <div style=\"font-size:12px; font-weight:900; color:#8E6CC9; margin-bottom:6px;\">💡 پیشنهادات و اقدامات بعدی<\u002Fdiv>\n                <sc-for list=\"{{ sheetAnalysis.suggestions }}\" as=\"c\" hint-placeholder-count=\"1\">\n                  <div style=\"font-size:12px; line-height:1.9; margin-bottom:4px;\">{{ c.t }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"position:relative; background:#fff; border:1px solid #E5DCF2; border-radius:14px; overflow:hidden; margin-top:14px;\">\n            <div style=\"background:#F3EDFB; color:#8E6CC9; font-weight:900; font-size:13px; padding:8px 14px; display:flex; align-items:center; gap:7px;\"><span>🖊️<\u002Fspan>نظر مدیریت و معاون آموزشی<\u002Fdiv>\n            <div style=\"padding:12px 14px;\">\n              <textarea class=\"no-print\" value=\"{{ sheetAdminComment }}\" onchange=\"{{ setAdminComment }}\" rows=\"2\" placeholder=\"در نسخه دیجیتال اینجا تایپ کنید؛ در نسخه چاپی، خطوط زیر برای نوشتن دستی است.\" style=\"width:100%; box-sizing:border-box; padding:10px 14px; border-radius:10px; border:2px solid #E5DCF2; font-family:inherit; font-size:13px; background:#FDFBFF; resize:vertical; margin-bottom:8px;\"><\u002Ftextarea>\n              <div style=\"font-size:13px; line-height:2.6; min-height:70px; padding:0 2px; background:repeating-linear-gradient(to bottom, transparent, transparent 33px, #EDE5F7 33px, #EDE5F7 34px);\">{{ sheetAdminCommentPrint }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"position:relative; display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:22px; text-align:center;\">\n            <div style=\"background:#fff; border:1.5px dashed #B7D6C2; border-radius:12px; padding:12px 8px 18px; font-size:12px; color:#6E8377;\">امضای مسئول پایه<br><b style=\"color:#2E7D53;\">{{ counselorName }}<\u002Fb><\u002Fdiv>\n            <div style=\"background:#fff; border:1.5px dashed #B7D6C2; border-radius:12px; padding:12px 8px 18px; font-size:12px; color:#6E8377;\">امضای معاون آموزشی<\u002Fdiv>\n            <div style=\"background:#fff; border:1.5px dashed #B7D6C2; border-radius:12px; padding:12px 8px 18px; font-size:12px; color:#6E8377;\">امضای مدیریت<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ======= Monthly report (printable) ======= -->\n    <sc-if value=\"{{ isReport }}\" hint-placeholder-val=\"{{ false }}\">\n      <section data-screen-label=\"گزارش ماهانه\">\n        <div class=\"no-print\" style=\"display:flex; gap:10px; margin-bottom:14px; align-items:center;\">\n          <h1 style=\"font-size:22px; font-weight:900; margin:0; flex:1;\">گزارش ۳۰ روز اخیر<\u002Fh1>\n          <button onclick=\"{{ copyRepSheet }}\" style=\"border:none; cursor:pointer; font-family:inherit; font-size:13px; font-weight:800; padding:10px 18px; border-radius:999px; background:#2E9E6B; color:#fff;\">{{ copyRepLabel }}<\u002Fbutton>\n          <button onclick=\"{{ dlRepCsv }}\" style=\"border:1px solid #2E9E6B; color:#2E7D53; background:#fff; cursor:pointer; font-family:inherit; font-size:13px; font-weight:700; padding:9px 16px; border-radius:999px;\">دانلود CSV<\u002Fbutton>\n          <button onclick=\"{{ exportJson }}\" style=\"border:1px solid #2A9D8F; color:#1F776D; background:#fff; cursor:pointer; font-family:inherit; font-size:13px; font-weight:700; padding:9px 18px; border-radius:999px;\">خروجی داده (اتصال به پلتفرم)<\u002Fbutton>\n          <button onclick=\"{{ printPage }}\" style=\"border:none; cursor:pointer; font-family:inherit; font-size:14px; font-weight:900; padding:10px 24px; border-radius:999px; background:#2E9E6B; color:#fff;\">چاپ / ذخیره PDF<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div class=\"no-print\" style=\"max-width:794px; margin:0 auto 14px; background:#E9F5EC; border:1px solid #C9E5D3; border-radius:14px; padding:12px 18px; font-size:13px; line-height:2; color:#2E7D53;\">\n          <b>راهنمای اشتراک با مدیر و معاون:<\u002Fb> دکمه «کپی گزارش» را بزن ← در گوگل شیت خالی Paste کن (Ctrl+V) ← از Share دسترسی <b>Commenter (نظردهنده)<\u002Fb> بده. آن‌ها فقط می‌توانند پایین گزارش (ردیف‌های «نظر مدیریت / معاون آموزشی») کامنت بگذارند و امکان ویرایش گزارش را ندارند.\n        <\u002Fdiv>\n\n        <div class=\"print-sheet\" style=\"background:#fff; border-radius:16px; box-shadow:0 8px 30px rgba(60,40,20,0.10); max-width:794px; margin:0 auto; padding:clamp(18px,5vw,44px); box-sizing:border-box;\">\n          <div style=\"display:flex; align-items:center; gap:14px; border-bottom:3px solid #2A9D8F; padding-bottom:14px;\">\n            <div style=\"width:46px; height:46px; border-radius:12px; background:#2A9D8F; color:#fff; display:grid; place-items:center; font-weight:900; font-size:22px;\">گ<\u002Fdiv>\n            <div style=\"flex:1;\">\n              <div style=\"font-weight:900; font-size:18px;\">گزارش ماهانه مشاوره پایه — ویژه مدیریت<\u002Fdiv>\n              <div style=\"font-size:12px; color:#8A7A70;\">{{ schoolName }} · پایه یازدهم تجربی · مسئول پایه: {{ counselorName }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"text-align:left; font-size:12px; color:#8A7A70;\">تاریخ گزارش<br><b style=\"font-size:13px; color:#3A2E2A;\">{{ todayFa }}<\u002Fb><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:18px;\">\n            <div style=\"background:#FFF7EE; border-radius:12px; padding:14px; text-align:center;\"><div style=\"font-size:26px; font-weight:900; color:#F2695C;\">{{ monthCount }}<\u002Fdiv><div style=\"font-size:12px; color:#8A7A70; font-weight:700;\">جلسه برگزار شد<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#FFF7EE; border-radius:12px; padding:14px; text-align:center;\"><div style=\"font-size:26px; font-weight:900; color:#2A9D8F;\">{{ monthStudentCount }}<\u002Fdiv><div style=\"font-size:12px; color:#8A7A70; font-weight:700;\">دانش‌آموز دیده شدند<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#FFF7EE; border-radius:12px; padding:14px; text-align:center;\"><div style=\"font-size:26px; font-weight:900; color:#E15554;\">{{ followCount }}<\u002Fdiv><div style=\"font-size:12px; color:#8A7A70; font-weight:700;\">پیگیری باز<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:20px;\">\n            <div style=\"font-weight:900; font-size:14px; color:#1F776D; margin-bottom:10px;\">موضوعات پرتکرار<\u002Fdiv>\n            <sc-for list=\"{{ topTopics }}\" as=\"t\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:8px;\">\n                <div style=\"width:150px; font-size:13px; font-weight:700; flex-shrink:0;\">{{ t.label }}<\u002Fdiv>\n                <div style=\"flex:1; height:12px; border-radius:999px; background:#FBF0E6;\"><div style=\"height:12px; border-radius:999px; background:#F4B942; width:{{ t.pct }}%;\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"width:26px; font-size:13px; color:#8A7A70;\">{{ t.countFa }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:20px;\">\n            <div style=\"font-weight:900; font-size:14px; color:#C2432F; margin-bottom:10px;\">دانش‌آموزان نیازمند پیگیری<\u002Fdiv>\n            <sc-if value=\"{{ hasFollowUps }}\" hint-placeholder-val=\"{{ false }}\">\n              <sc-for list=\"{{ followUps }}\" as=\"f\" hint-placeholder-count=\"2\">\n                <div style=\"font-size:13px; padding:6px 0; border-bottom:1px dashed #F3E3D3; display:flex; gap:10px;\"><b style=\"min-width:140px;\">{{ f.name }}<\u002Fb><span style=\"color:#8A7A70;\">{{ f.topic }} · {{ f.dateFa }}<\u002Fspan><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noFollowUps }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"font-size:13px; color:#8A7A70;\">مورد بازی وجود ندارد.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:20px;\">\n            <div style=\"font-weight:900; font-size:14px; color:#1F776D; margin-bottom:10px;\">جلسات این دوره به تفکیک دانش‌آموز<\u002Fdiv>\n            <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:4px 24px;\">\n              <sc-for list=\"{{ reportStudents }}\" as=\"r\" hint-placeholder-count=\"6\">\n                <div style=\"display:flex; justify-content:space-between; font-size:13px; padding:5px 0; border-bottom:1px dashed #F3E3D3;\">\n                  <span style=\"font-weight:700;\">{{ r.name }}<\u002Fspan><span style=\"color:#8A7A70;\">{{ r.countFa }} جلسه<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:30px; text-align:center;\">\n            <div style=\"border-top:2px solid #EAD9C8; padding-top:8px; font-size:12px; color:#8A7A70;\">امضای مسئول پایه<br><b style=\"color:#3A2E2A;\">{{ counselorName }}<\u002Fb><\u002Fdiv>\n            <div style=\"border-top:2px solid #EAD9C8; padding-top:8px; font-size:12px; color:#8A7A70;\">ملاحظات و امضای مدیر<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <!-- ======= Mobile bottom tab bar ======= -->\n  <nav class=\"bottomnav no-print\">\n    <button onclick=\"{{ goDash }}\" style=\"flex:1; border:none; background:none; cursor:pointer; font-family:inherit; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 2px; color:{{ tabDashColor }};\">\n      <span style=\"font-size:20px; line-height:1;\">🏠<\u002Fspan><span style=\"font-size:11px; font-weight:800;\">میز کار<\u002Fspan>\n    <\u002Fbutton>\n    <button onclick=\"{{ goStudents }}\" style=\"flex:1; border:none; background:none; cursor:pointer; font-family:inherit; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 2px; color:{{ tabStuColor }};\">\n      <span style=\"font-size:20px; line-height:1;\">👥<\u002Fspan><span style=\"font-size:11px; font-weight:800;\">دانش‌آموزان<\u002Fspan>\n    <\u002Fbutton>\n    <button onclick=\"{{ goNew }}\" style=\"flex:1; border:none; background:none; cursor:pointer; font-family:inherit; display:flex; flex-direction:column; align-items:center; gap:3px; padding:2px;\">\n      <span style=\"width:44px; height:44px; margin-top:-16px; border-radius:50%; background:#2E9E6B; color:#fff; display:flex; align-items:center; justify-content:center; font-size:26px; box-shadow:0 3px 10px rgba(46,158,107,0.4);\">+<\u002Fspan>\n      <span style=\"font-size:11px; font-weight:800; color:#2E9E6B;\">ثبت جلسه<\u002Fspan>\n    <\u002Fbutton>\n    <button onclick=\"{{ goReport }}\" style=\"flex:1; border:none; background:none; cursor:pointer; font-family:inherit; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 2px; color:{{ tabRepColor }};\">\n      <span style=\"font-size:20px; line-height:1;\">📊<\u002Fspan><span style=\"font-size:11px; font-weight:800;\">گزارش ماهانه<\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fnav>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;schoolName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;دبیرستان گلبانگ&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;مشخصات&quot;},&quot;counselorName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot; مسئول پایه یازدهم&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;مشخصات&quot;},&quot;showNotesOnReport&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;حریم خصوصی&quot;}}\">\nclass Component extends DCLogic {\n  TOPICS = ['افت درسی','برنامه‌ریزی مطالعه','اضطراب امتحان','انگیزه و هدف','کنکور و انتخاب رشته','خانوادگی','ارتباط با همسالان','حضور و غیاب','استفاده از موبایل','سلامت و خواب'];\n  TYPES = [ {id:'ind', label:'مشاوره فردی'}, {id:'par', label:'مشاوره با اولیا'}, {id:'both', label:'مشاوره دانش‌آموز و اولیا'}, {id:'aca', label:'تحصیلی و افت درسی'} ];\n  MOODS = [ {id:1,label:'عالی',color:'#2E9E6B'}, {id:2,label:'خوب',color:'#7CB342'}, {id:3,label:'متوسط',color:'#F4B942'}, {id:4,label:'نگران',color:'#F28C38'}, {id:5,label:'نیازمند توجه جدی',color:'#E15554'} ];\n  ACTIONS = ['برنامه مطالعاتی داده شد','تماس با اولیا','ارجاع به مشاور مدرسه','پیگیری هفته آینده','هماهنگی با دبیر','تشویق و دلگرمی','تذکر'];\n  RATINGS = ['روحیه و انگیزه','تمرکز','مدیریت زمان','خواب و انرژی','همکاری خانواده'];\n  AVATARS = ['#F2695C','#2A9D8F','#F4B942','#8E7CC3','#F28C38','#5B9BD5'];\n  KEY = 'atomia-counsel-v2';\n  ROSTER = [\"مبینا اسدی غیاثوند\",\"الینا اسمعیل زاده رودسری\",\"پانیذ اعتباری\",\"گلاره الله یاری\",\"مایسا آقاجانى\",\"تارا تجدد\",\"ملیسا جامى\",\"پریا جبارپور\",\"پارمیس جعفری صرافی\",\"وانیا حسینی فرد\",\"ساینا سادات حسینی نژاد\",\"گلسانا حقیقی\",\"باران حمیدسمیعی\",\"آیلین خانبابایی\",\"آناهیتا خلیلی\",\"دریتا دشتی پور\",\"ایلین رادفر\",\"پارمیدا رحمانی\",\"آترینا رحمتی نژاد\",\"پانیا رزاق زاده\",\"سنا سیدی\",\"شایلین شیخ\",\"یگانه طالبی\",\"نگار طاهری\",\"ستایش عزیزی\",\"ساغر عنصری\",\"آناهیتا فکوری نیا\",\"نیالا قربانی\",\"دلسا کلانی\",\"دینا محمدی\",\"هستی مدنی\",\"پارمیدا مطهری\",\"نازنین زهرا مویدمحسنی\",\"ملینا میان بندی\",\"نیوشا نادرخانی\",\"ملینا نادری\",\"هستی ناطقی\",\"آندیا نصیری\",\"هانا هراتیان نژاد\"];\n\n  MONTHS = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];\n\n  g2j(gy,gm,gd){ const g=[0,31,59,90,120,151,181,212,243,273,304,334]; const gy2=(gm>2)?gy+1:gy; let days=355666+365*gy+Math.floor((gy2+3)/4)-Math.floor((gy2+99)/100)+Math.floor((gy2+399)/400)+gd+g[gm-1]; let jy=-1595+33*Math.floor(days/12053); days%=12053; jy+=4*Math.floor(days/1461); days%=1461; if(days>365){jy+=Math.floor((days-1)/365); days=(days-1)%365;} let jm,jd; if(days<186){jm=1+Math.floor(days/31); jd=1+days%31;} else {jm=7+Math.floor((days-186)/30); jd=1+(days-186)%30;} return [jy,jm,jd]; }\n  j2g(jy,jm,jd){ jy+=1595; let days=-355668+365*jy+Math.floor(jy/33)*8+Math.floor((jy%33+3)/4)+jd+((jm<7)?(jm-1)*31:(jm-7)*30+186); let gy=400*Math.floor(days/146097); days%=146097; if(days>36524){gy+=100*Math.floor(--days/36524); days%=36524; if(days>=365)days++;} gy+=4*Math.floor(days/1461); days%=1461; if(days>365){gy+=Math.floor((days-1)/365); days=(days-1)%365;} let gd=days+1; const sal=[0,31,((gy%4===0&&gy%100!==0)||gy%400===0)?29:28,31,30,31,30,31,31,30,31,30,31]; let gm; for(gm=0;gm<13&&gd>sal[gm];gm++) gd-=sal[gm]; return [gy,gm,gd]; }\n  todayJ(){ const d=new Date(); return this.g2j(d.getFullYear(), d.getMonth()+1, d.getDate()); }\n\n  normName(s){ return (s||'').replace(/[يى]/g,'ی').replace(/ك/g,'ک').replace(/[\\u0653\\u0654]/g,'').replace(/آ/g,'ا').replace(/[\\s\\u200c]+/g,''); }\n  gradesFor(name){\n    const G = this.state.grades; if(!G) return null;\n    const n = this.normName(name);\n    for (const key of Object.keys(G)) {\n      const k = this.normName(key);\n      if (n === k || n.startsWith(k) || k.startsWith(n)) return G[key];\n    }\n    return null;\n  }\n  topsBySubject(){\n    if (this._tops) return this._tops;\n    const G = this.state.grades; if(!G) return {};\n    const t = {};\n    for (const key of Object.keys(G)) for (const s of G[key]) {\n      if (!s.exams.length) continue;\n      const avg = s.exams.reduce((a,e)=>a+e[1],0)/s.exams.length;\n      if (!(s.subject in t) || avg > t[s.subject]) t[s.subject] = avg;\n    }\n    this._tops = t; return t;\n  }\n  gradeRows(name){\n    const subs = this.gradesFor(name); if(!subs) return [];\n    const tops = this.topsBySubject();\n    return subs.map(s=>{\n      const sAvg = s.exams.reduce((a,e)=>a+e[1],0)/s.exams.length;\n      const withC = s.exams.filter(e=>e[2]!=null);\n      const cAvg = withC.length ? withC.reduce((a,e)=>a+e[2],0)/withC.length : 0;\n      const tAvg = tops[s.subject] || 0;\n      const max = Math.max(sAvg, cAvg, tAvg, 0.01);\n      return { subject:s.subject, examCountFa:this.fa(s.exams.length),\n        sVal:sAvg.toLocaleString('fa-IR',{maximumFractionDigits:1}),\n        cVal:cAvg.toLocaleString('fa-IR',{maximumFractionDigits:1}),\n        tVal:tAvg.toLocaleString('fa-IR',{maximumFractionDigits:1}),\n        sPct:Math.round(sAvg/max*100), cPct:Math.round(cAvg/max*100), tPct:Math.round(tAvg/max*100),\n        better: sAvg >= cAvg };\n    });\n  }\n\n  copyRows(rows, key){\n    const tsv = rows.map(r=>r.map(c=>String(c??'').replace(/\\t/g,' ')).join('\\t')).join('\\n');\n    navigator.clipboard.writeText(tsv).then(()=>{\n      this.setState({copied:key});\n      clearTimeout(this._ct); this._ct = setTimeout(()=>this.setState({copied:''}), 2500);\n    });\n  }\n  downloadCsv(rows, name){\n    const csv = '\\ufeff' + rows.map(r=>r.map(c=>'\"'+String(c??'').replace(/\"/g,'\"\"')+'\"').join(',')).join('\\n');\n    const a = document.createElement('a');\n    a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8'}));\n    a.download = name + '.csv'; a.click();\n  }\n  studentReportRows(stu){\n    const sessions = this.state.sessions.filter(x=>x.studentId===stu.id).sort((a,b)=>new Date(a.date)-new Date(b.date));\n    const rows = [];\n    rows.push(['گزارش مشاوره دانش‌آموز', stu.name]);\n    rows.push(['پایه', 'یازدهم تجربی']);\n    rows.push(['تاریخ تهیه گزارش', this.fmt(new Date().toISOString())]);\n    rows.push([]);\n    rows.push(['ردیف','روز و تاریخ','نوع جلسه','موضوعات','اقدامات','حال دانش‌آموز','یادداشت مسئول پایه','پیگیری']);\n    sessions.forEach((s,i)=>rows.push([this.fa(i+1), this.fmt(s.date), this.typeOf(s.type), s.topics.join('، '), s.actions.join('، '), this.moodOf(s.mood).label, s.note||'', s.follow?'دارد':'—']));\n    const grades = this.gradeRows(stu.name);\n    if (grades.length){\n      rows.push([]);\n      rows.push(['وضعیت درسی','میانگین دانش‌آموز','میانگین کلاس','بالاترین کلاس','تعداد آزمون']);\n      grades.forEach(g=>rows.push([g.subject, g.sVal, g.cVal, g.tVal, g.examCountFa]));\n    }\n    const rep = this.reportFor(stu.name);\n    if (rep){\n      rows.push([]);\n      rows.push(['📊 گزارش جامع تحلیل شیوه مطالعه']);\n      if(rep.goal) rows.push(['هدف تحصیلی', rep.goal]);\n      if(rep.status) rows.push(['وضعیت کلی', rep.status]);\n      rows.push([]);\n      rows.push(['سبک یادگیری (VARK)','توضیح','سطح']);\n      (rep.vark||[]).forEach(v=>rows.push([v.style, v.desc, v.level]));\n      rows.push([]);\n      rows.push(['نقاط مثبت', ...(rep.positives||[])]);\n      rows.push(['چالش‌ها', ...(rep.challenges||[])]);\n      if(rep.mainProblem) rows.push(['مشکل اصلی', rep.mainProblem]);\n      rows.push([]);\n      rows.push(['نسخه مطالعه هر درس','مشکل','روش صحیح','نکته کلیدی']);\n      (rep.subjects||[]).forEach(s=>rows.push([s.name, s.problem, (s.methods||[]).join('؛ '), s.key]));\n      rows.push([]);\n      rows.push(['برنامه روزانه', ...(rep.planDaily||[])]);\n      rows.push(['برنامه هفتگی', ...(rep.planWeekly||[])]);\n      rows.push(['نسخه طلایی', ...(rep.golden||[]), rep.goldenResult||'']);\n      rows.push([]);\n      (rep.examReports||[]).forEach(er=>{\n        rows.push(['گزارش تحلیل ' + er.title, 'تاریخ: ' + er.date]);\n        rows.push(['درس','نقاط ضعف','مشکل اصلی']);\n        er.rows.forEach(r=>rows.push([r.subject, (r.weaknesses||[]).join('؛ '), r.main]));\n        rows.push([]);\n      });\n      if((rep.examSummary||[]).length) rows.push(['الگوی ثابت ضعف‌ها', ...rep.examSummary]);\n      rows.push(['نتیجه نهایی', ...(rep.finalResult||[])]);\n    }\n    rows.push([]);\n    rows.push(['نظر مدیریت:','']);\n    rows.push([]);\n    rows.push(['نظر معاون آموزشی:','']);\n    return rows;\n  }\n  monthlyReportRows(){\n    const now = Date.now();\n    const month = this.state.sessions.filter(s=>(now-new Date(s.date).getTime())/86400000<=30);\n    const rows = [];\n    rows.push(['گزارش ماهانه مشاوره پایه یازدهم تجربی']);\n    rows.push(['تاریخ گزارش', this.fmt(new Date().toISOString())]);\n    rows.push(['تعداد جلسات (۳۰ روز)', this.fa(month.length)]);\n    rows.push(['دانش‌آموزان دیده‌شده', this.fa(new Set(month.map(x=>x.studentId)).size)]);\n    rows.push(['پیگیری باز', this.fa(this.state.sessions.filter(s=>s.follow).length)]);\n    rows.push([]);\n    rows.push(['ردیف','دانش‌آموز','روز و تاریخ','نوع جلسه','موضوعات','اقدامات','حال دانش‌آموز','پیگیری']);\n    month.sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach((s,i)=>rows.push([this.fa(i+1), this.stuOf(s.studentId), this.fmt(s.date), this.typeOf(s.type), s.topics.join('، '), s.actions.join('، '), this.moodOf(s.mood).label, s.follow?'دارد':'—']));\n    rows.push([]);\n    rows.push(['نظر مدیریت:','']);\n    rows.push([]);\n    rows.push(['نظر معاون آموزشی:','']);\n    return rows;\n  }\n\n  analysisFor(sheet){\n    const ch=[], st=[], sg=[];\n    const name = this.stuOf(sheet.studentId);\n    const f1 = (n)=>Math.abs(n).toLocaleString('fa-IR',{maximumFractionDigits:1});\n    const subs = this.gradesFor(name)||[];\n    const diffs = subs.map(s=>{\n      const sAvg = s.exams.reduce((a,e)=>a+e[1],0)/s.exams.length;\n      const withC = s.exams.filter(e=>e[2]!=null);\n      const cAvg = withC.length ? withC.reduce((a,e)=>a+e[2],0)/withC.length : sAvg;\n      return {subject:s.subject, d:sAvg-cAvg};\n    });\n    if (diffs.length){\n      const weak = diffs.reduce((a,b)=>a.d<b.d?a:b);\n      const strong = diffs.reduce((a,b)=>a.d>b.d?a:b);\n      if (weak.d < -0.5){ ch.push('در درس «'+weak.subject+'» میانگین دانش‌آموز حدود '+f1(weak.d)+' نمره پایین‌تر از میانگین کلاس است.'); sg.push('تمرکز برنامه مطالعاتی بر تقویت درس «'+weak.subject+'» و مرور آزمون‌های آن.'); }\n      if (strong.d > 0.5) st.push('در درس «'+strong.subject+'» حدود '+f1(strong.d)+' نمره بالاتر از میانگین کلاس عمل کرده است.');\n    }\n    const r = sheet.ratings||{};\n    const lows = this.RATINGS.filter(k=>r[k] && r[k]<=2);\n    const highs = this.RATINGS.filter(k=>r[k]>=4);\n    if (lows.length){ ch.push('امتیاز پایین در: '+lows.join('، ')+'.'); sg.push('گفتگو و برنامه‌ریزی مشترک برای بهبود '+lows[0]+'.'); }\n    if (highs.length) st.push('وضعیت مطلوب در: '+highs.join('، ')+'.');\n    if (sheet.mood>=4) ch.push('حال عمومی دانش‌آموز در این جلسه «'+this.moodOf(sheet.mood).label+'» ارزیابی شده و نیازمند توجه است.');\n    else if (sheet.mood>0 && sheet.mood<=2) st.push('حال عمومی دانش‌آموز در این جلسه «'+this.moodOf(sheet.mood).label+'» بوده است.');\n    const n = this.state.sessions.filter(x=>x.studentId===sheet.studentId).length;\n    if (n>=3) sg.push('این '+this.fa(n)+'مین جلسه ثبت‌شده است؛ مقایسه روند با جلسات قبل در پرونده دانش‌آموز توصیه می‌شود.');\n    if (sheet.follow) sg.push('پیگیری فعال است — نتیجه اقدامات در جلسه بعد بررسی شود.');\n    if (!ch.length) ch.push('چالش قابل‌توجهی در داده‌های این جلسه دیده نمی‌شود.');\n    if (!st.length) st.push('حضور و مشارکت دانش‌آموز در جلسه.');\n    if (!sg.length) sg.push('ادامه روند فعلی و ثبت جلسات بعدی برای تحلیل روند.');\n    return { challenges:ch.map(t=>({t})), strengths:st.map(t=>({t})), suggestions:sg.map(t=>({t})) };\n  }\n\n  reportFor(name){\n    const R = this.state.reports; if(!R) return null;\n    const n = this.normName(name);\n    for (const key of Object.keys(R)) {\n      const k = this.normName(key);\n      if (n === k || n.startsWith(k) || k.startsWith(n)) return R[key];\n    }\n    return null;\n  }\n\n  componentDidMount(){\n    if (window.__grades){ this._tops=null; this.setState({grades:window.__grades}); }\n    else fetch('./grades.json').then(r=>r.json()).then(g=>{ this._tops=null; this.setState({grades:g}); }).catch(()=>{});\n    if (window.__reports){ this.setState({reports:window.__reports}); }\n    else fetch('./reports.json').then(r=>r.json()).then(rp=>this.setState({reports:rp})).catch(()=>{});\n  }\n\n  state = this.load();\n\n  load() {\n    const base = { view:'dash', selId:null, sheetId:null, prevView:'dash', query:'', showAdd:false, addText:'', formError:'',\n      grades:null, reports:null, copied:'', showReport:false,\n      form:{ studentId:'', type:'', topics:[], mood:0, actions:[], note:'', follow:false, jdate:null, ratings:{} } };\n    try {\n      const raw = localStorage.getItem(this.KEY);\n      if (raw) { const d = JSON.parse(raw); return Object.assign(base, {students:d.students, sessions:d.sessions}); }\n    } catch(e) {}\n    return Object.assign(base, this.seed());\n  }\n\n  seed() {\n    return { students: this.ROSTER.map((n,i)=>({id:'s'+i, name:n})), sessions: [] };\n  }\n\n  persist(patch) {\n    this.setState(patch, () => {\n      try { localStorage.setItem(this.KEY, JSON.stringify({students:this.state.students, sessions:this.state.sessions})); } catch(e) {}\n    });\n  }\n\n  fmt(iso) {\n    try { return new Intl.DateTimeFormat('fa-IR',{weekday:'long', year:'numeric', month:'long', day:'numeric'}).format(new Date(iso)); }\n    catch(e){ return iso; }\n  }\n  fa(n){ return (n||0).toLocaleString('fa-IR'); }\n  moodOf(id){ return this.MOODS.find(m=>m.id===id) || {label:'—', color:'#CBBCB0'}; }\n  typeOf(id){ const t=this.TYPES.find(t=>t.id===id); return t?t.label:'—'; }\n  stuOf(id){ const s=this.state.students.find(s=>s.id===id); return s?s.name:'—'; }\n\n  go(view, extra){ this.setState(Object.assign({view, formError:'', showReport:false}, extra||{})); window.scrollTo(0,0); }\n\n  openSheet(id){ this.setState({view:'sheet', sheetId:id, prevView:this.state.view}); window.scrollTo(0,0); }\n\n  chipify(list, selected, toggle, dotFn) {\n    return list.map(item => {\n      const label = typeof item==='string' ? item : item.label;\n      const val = typeof item==='string' ? item : item.id;\n      const on = Array.isArray(selected) ? selected.includes(val) : selected===val;\n      return { label, toggle:(e)=>{e.preventDefault(); toggle(val);}, \n        bg: on?'#2E9E6B':'#fff', fg: on?'#fff':'#5C6B60', bd: on?'#2E9E6B':'#D9E2D4',\n        dot: dotFn ? dotFn(item, on) : undefined };\n    });\n  }\n\n  setForm(patch){ this.setState({form:Object.assign({}, this.state.form, patch), formError:''}); }\n  toggleArr(arr, v){ return arr.includes(v) ? arr.filter(x=>x!==v) : arr.concat([v]); }\n\n  renderVals() {\n    const S = this.state;\n    const schoolName = this.props.schoolName ?? 'دبیرستان';\n    const counselorName = this.props.counselorName ?? 'مسئول پایه یازدهم';\n    const showNotes = this.props.showNotesOnReport ?? true;\n    const now = Date.now();\n    const days = (iso)=> (now - new Date(iso).getTime())/86400000;\n    const sessions = S.sessions.slice().sort((a,b)=> new Date(b.date)-new Date(a.date));\n    const month = sessions.filter(s=>days(s.date)<=30);\n    const week = sessions.filter(s=>days(s.date)<=7);\n    const follows = sessions.filter(s=>s.follow);\n\n    // top topics (30d)\n    const tc = {};\n    month.forEach(s=>s.topics.forEach(t=>tc[t]=(tc[t]||0)+1));\n    const maxT = Math.max(1, ...Object.values(tc));\n    const topTopics = Object.entries(tc).sort((a,b)=>b[1]-a[1]).slice(0,5)\n      .map(([label,count])=>({label, countFa:this.fa(count), pct: Math.round(count/maxT*100)}));\n\n    const enrich = (s) => ({\n      id:s.id, name:this.stuOf(s.studentId), dateFa:this.fmt(s.date), typeLabel:this.typeOf(s.type),\n      topicsText: s.topics.join('، ') || '—', actionsText: s.actions.join('، ') || '—',\n      moodColor:this.moodOf(s.mood).color, moodLabel:this.moodOf(s.mood).label,\n      note:s.note, hasNote: !!s.note,\n      open:(e)=>{e.preventDefault(); this.go('student',{selId:s.studentId});},\n      sheet:(e)=>{e.preventDefault(); this.openSheet(s.id);}\n    });\n\n    const followUps = follows.map(s=>({\n      name:this.stuOf(s.studentId), topic:s.topics[0]||this.typeOf(s.type), dateFa:this.fmt(s.date),\n      open:(e)=>{e.preventDefault(); this.go('student',{selId:s.studentId});},\n      resolve:(e)=>{e.preventDefault(); this.persist({sessions: S.sessions.map(x=>x.id===s.id?Object.assign({},x,{follow:false}):x)});}\n    }));\n\n    // students view\n    const q = S.query.trim();\n    const studentRows = S.students\n      .filter(st=>!q || st.name.includes(q))\n      .map((st,i)=>{\n        const ss = sessions.filter(x=>x.studentId===st.id);\n        return { id:st.id, name:st.name, initial:st.name[0],\n          avatarBg:this.AVATARS[i%this.AVATARS.length],\n          countFa:this.fa(ss.length), lastFa: ss[0]?this.fmt(ss[0].date):'—',\n          needsFollow: ss.some(x=>x.follow),\n          open:(e)=>{e.preventDefault(); this.go('student',{selId:st.id});} };\n      });\n\n    // student detail\n    const stu = S.students.find(s=>s.id===S.selId);\n    const stuSess = stu ? sessions.filter(x=>x.studentId===stu.id) : [];\n    const stuMoodDots = stuSess.slice(0,10).reverse().map(x=>({color:this.moodOf(x.mood).color, label:this.moodOf(x.mood).label}));\n\n    // sheet\n    const sheet = S.sessions.find(x=>x.id===S.sheetId);\n\n    // form chips\n    const F = S.form;\n    const typeChips = this.chipify(this.TYPES, F.type, v=>this.setForm({type:v}));\n    const topicChips = this.chipify(this.TOPICS, F.topics, v=>this.setForm({topics:this.toggleArr(F.topics,v)}));\n    const actionChips = this.chipify(this.ACTIONS, F.actions, v=>this.setForm({actions:this.toggleArr(F.actions,v)}));\n    const moodChips = this.MOODS.map(m=>{\n      const on = F.mood===m.id;\n      return { label:m.label, dot:m.color, toggle:(e)=>{e.preventDefault(); this.setForm({mood:m.id});},\n        bg: on?'#3A2E2A':'#fff', fg: on?'#fff':'#6B5B52', bd: on?'#3A2E2A':'#EAD9C8' };\n    });\n\n    const navSty = (v)=> S.view===v ? ['#2E9E6B','#fff'] : ['#EFEBDD','#7C8A80'];\n    const [navDashBg,navDashFg]=navSty('dash'); const [navStuBg,navStuFg]=navSty(S.view==='student'?S.view:'students'); const [navRepBg,navRepFg]=navSty('report');\n    const tabDashColor = S.view==='dash' ? '#2E9E6B' : '#9AA79E';\n    const tabStuColor = (S.view==='students'||S.view==='student'||S.view==='sheet') ? '#2E9E6B' : '#9AA79E';\n    const tabRepColor = S.view==='report' ? '#2E9E6B' : '#9AA79E';\n\n    const reportStudents = S.students.map(st=>({name:st.name, count:month.filter(x=>x.studentId===st.id).length}))\n      .filter(r=>r.count>0).sort((a,b)=>b.count-a.count).map(r=>({name:r.name, countFa:this.fa(r.count)}));\n\n    return {\n      schoolName, counselorName,\n      isDash:S.view==='dash', isNew:S.view==='new', isStudents:S.view==='students',\n      isStudent:S.view==='student', isSheet:S.view==='sheet', isReport:S.view==='report',\n      navDashBg,navDashFg,navStuBg,navStuFg,navRepBg,navRepFg,\n      tabDashColor, tabStuColor, tabRepColor,\n      goDash:()=>this.go('dash'), goNew:()=>this.go('new'), goStudents:()=>this.go('students'), goReport:()=>this.go('report'),\n\n      weekCount:this.fa(week.length), monthCount:this.fa(month.length),\n      followCount:this.fa(follows.length), studentCount:this.fa(S.students.length),\n      monthStudentCount:this.fa(new Set(month.map(x=>x.studentId)).size),\n      todayFa:this.fmt(new Date().toISOString()),\n      followUps, hasFollowUps:followUps.length>0, noFollowUps:followUps.length===0,\n      topTopics, recentSessions:sessions.slice(0,7).map(enrich), reportStudents,\n\n      // students\n      query:S.query, setQuery:(e)=>this.setState({query:e.target.value}),\n      showAdd:S.showAdd, toggleAdd:(e)=>{if(e)e.preventDefault(); this.setState({showAdd:!S.showAdd});},\n      addText:S.addText, setAddText:(e)=>this.setState({addText:e.target.value}),\n      addStudents:()=>{\n        const names = S.addText.split('\\n').map(x=>x.trim()).filter(Boolean);\n        if(!names.length) return;\n        const added = names.map((n,i)=>({id:'s'+Date.now()+'_'+i, name:n}));\n        this.persist({students:S.students.concat(added), addText:'', showAdd:false});\n      },\n      studentRows,\n\n      // student detail\n      stuName: stu?stu.name:'—', stuInitial: stu?stu.name[0]:'', stuCountFa:this.fa(stuSess.length),\n      stuMoodDots, stuSessions: stuSess.map(enrich),\n\n      // comprehensive analysis report\n      stuReport: stu ? this.reportFor(stu.name) : null,\n      stuReportGoal: (stu && this.reportFor(stu.name)) ? this.reportFor(stu.name).goal : '',\n      stuReportStatus: (stu && this.reportFor(stu.name)) ? this.reportFor(stu.name).status : '',\n      stuHasReport: !!(stu && this.reportFor(stu.name)),\n      stuNoReport: !!(stu && !this.reportFor(stu.name)),\n      stuReportHasMainProblem: !!(stu && this.reportFor(stu.name) && this.reportFor(stu.name).mainProblem),\n      stuReportHasExams: !!(stu && this.reportFor(stu.name) && (this.reportFor(stu.name).examReports||[]).length),\n      stuReportHasExamSummary: !!(stu && this.reportFor(stu.name) && (this.reportFor(stu.name).examSummary||[]).length),\n      showReport: S.showReport,\n      toggleReport: ()=>this.setState({showReport:!S.showReport}),\n      reportToggleLabel: S.showReport ? 'بستن گزارش ▲' : 'مشاهده گزارش کامل ▼',\n\n      // form\n      studentOptions: S.students.slice().sort((a,b)=>a.name.localeCompare(b.name,'fa')).map(s=>({id:s.id, name:s.name})),\n      formStudentId:F.studentId, setFormStudent:(e)=>this.setForm({studentId:e.target.value}),\n      typeChips, topicChips, moodChips, actionChips,\n      formNote:F.note, setFormNote:(e)=>this.setForm({note:e.target.value}),\n      formFollow:F.follow, toggleFormFollow:()=>this.setForm({follow:!F.follow}),\n      formError:S.formError, hasFormError:!!S.formError,\n\n      // jalali date picker\n      jDay: (F.jdate || this.todayJ())[2],\n      jMonth: (F.jdate || this.todayJ())[1],\n      jYear: (F.jdate || this.todayJ())[0],\n      dayOptions: Array.from({length:31},(_,i)=>({v:i+1, label:this.fa(i+1)})),\n      monthOptions: this.MONTHS.map((m,i)=>({v:i+1, label:m})),\n      yearOptions: [1405,1406].map(v=>({v, label:v.toLocaleString('fa-IR',{useGrouping:false})})),\n      setJDay:(e)=>{ const j=F.jdate||this.todayJ(); this.setForm({jdate:[j[0],j[1],+e.target.value]}); },\n      setJMonth:(e)=>{ const j=F.jdate||this.todayJ(); this.setForm({jdate:[j[0],+e.target.value,j[2]]}); },\n      setJYear:(e)=>{ const j=F.jdate||this.todayJ(); this.setForm({jdate:[+e.target.value,j[1],j[2]]}); },\n\n      // ratings (1-5 stars)\n      ratingRows: this.RATINGS.map(name=>({\n        label: name,\n        stars: [1,2,3,4,5].map(v=>({\n          ch: (F.ratings[name]||0)>=v ? '★' : '☆',\n          color: (F.ratings[name]||0)>=v ? '#F4B942' : '#CFC9B8',\n          set:(e)=>{ e.preventDefault(); this.setForm({ratings:Object.assign({}, F.ratings, {[name]: F.ratings[name]===v ? 0 : v})}); }\n        }))\n      })),\n\n      // grade comparison charts\n      stuGradeRows: stu ? this.gradeRows(stu.name) : [],\n      stuHasGrades: !!(stu && this.gradeRows(stu.name).length),\n      sheetGradeRows: sheet ? this.gradeRows(this.stuOf(sheet.studentId)) : [],\n      sheetHasGrades: !!(sheet && this.gradeRows(this.stuOf(sheet.studentId)).length),\n\n      saveSession:()=>{\n        if(!F.studentId){ this.setState({formError:'دانش‌آموز را انتخاب کنید.'}); return; }\n        if(!F.type){ this.setState({formError:'نوع جلسه را انتخاب کنید.'}); return; }\n        if(!F.topics.length){ this.setState({formError:'حداقل یک موضوع انتخاب کنید.'}); return; }\n        const j = F.jdate || this.todayJ();\n        const [gy,gm,gd] = this.j2g(j[0], j[1], j[2]);\n        const sd = new Date(gy, gm-1, gd, 12, 0, 0);\n        const ns = { id:'s'+Date.now(), studentId:F.studentId, date:sd.toISOString(),\n          type:F.type, topics:F.topics, mood:F.mood||3, actions:F.actions, note:F.note.trim(),\n          follow:F.follow, ratings:F.ratings, adminComment:'' };\n        this.persist({ sessions:S.sessions.concat([ns]),\n          form:{studentId:'', type:'', topics:[], mood:0, actions:[], note:'', follow:false, jdate:null, ratings:{}},\n          view:'sheet', sheetId:ns.id, prevView:'dash' });\n        window.scrollTo(0,0);\n      },\n\n      // sheet\n      sheetRatings: sheet ? this.RATINGS.map(name=>{\n        const v = (sheet.ratings||{})[name]||0;\n        return { label:name, valFa: v?this.fa(v):'—',\n          stars:[1,2,3,4,5].map(i=>({ch: v>=i?'★':'☆', color: v>=i?'#F4B942':'#D8D2C4'})) };\n      }) : [],\n      sheetHasRatings: !!(sheet && sheet.ratings && Object.values(sheet.ratings).some(v=>v>0)),\n      sheetAnalysis: sheet ? this.analysisFor(sheet) : {challenges:[], strengths:[], suggestions:[]},\n      sheetNo: sheet ? this.fa(S.sessions.indexOf(sheet)+1) : '',\n      sheetStudent: sheet?this.stuOf(sheet.studentId):'', sheetDateFa: sheet?this.fmt(sheet.date):'',\n      sheetType: sheet?this.typeOf(sheet.type):'', sheetMood: sheet?this.moodOf(sheet.mood).label:'',\n      sheetMoodColor: sheet?this.moodOf(sheet.mood).color:'#ccc',\n      sheetTopics: sheet?sheet.topics.map(t=>({label:t})):[],\n      sheetActions: sheet ? (sheet.actions.length?sheet.actions:['—']).map(a=>({label:a})) : [],\n      sheetNote: sheet ? (sheet.note || '—') : '',\n      sheetAdminComment: sheet?sheet.adminComment:'',\n      sheetAdminCommentPrint: sheet ? (sheet.adminComment || ' ') : ' ',\n      setAdminComment:(e)=>{ const v=e.target.value;\n        this.persist({sessions:S.sessions.map(x=>x.id===S.sheetId?Object.assign({},x,{adminComment:v}):x)}); },\n      sheetBack:()=>this.go(S.prevView),\n      printPage:()=>window.print(),\n\n      // google-sheet friendly exports\n      copyStuLabel: S.copied==='stu' ? '✓ کپی شد — در گوگل شیت Paste کن' : '📋 کپی گزارش برای گوگل شیت',\n      copyRepLabel: S.copied==='rep' ? '✓ کپی شد — در گوگل شیت Paste کن' : '📋 کپی گزارش برای گوگل شیت',\n      copyStuSheet:()=>{ if(stu) this.copyRows(this.studentReportRows(stu), 'stu'); },\n      dlStuCsv:()=>{ if(stu) this.downloadCsv(this.studentReportRows(stu), 'گزارش ' + stu.name); },\n      printStu:()=>{ this.setState({showReport:true}, ()=>setTimeout(()=>window.print(), 60)); },\n      copyRepSheet:()=>this.copyRows(this.monthlyReportRows(), 'rep'),\n      dlRepCsv:()=>this.downloadCsv(this.monthlyReportRows(), 'گزارش ماهانه مشاوره'),\n\n      exportJson:()=>{\n        const blob = new Blob([JSON.stringify({platform:'atomia', exportedAt:new Date().toISOString(), grade:'یازدهم تجربی', students:S.students, sessions:S.sessions}, null, 2)], {type:'application/json'});\n        const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='counseling-data.json'; a.click();\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
