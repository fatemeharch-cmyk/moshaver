document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ortant; }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div dir=\"rtl\" style=\"min-height:100vh; font-family:'Vazirmatn',sans-serif; color:#3A2E2A;\">\n\n  <!-- ======= Header / Nav ======= -->\n  <header class=\"no-print\" style=\"background:#fff; border-bottom:3px solid #2E9E6B; position:sticky; top:0; z-index:10;\">\n    <div style=\"max-width:1060px; margin:0 auto; padding:14px 20px; display:flex; align-items:center; gap:16px; flex-wrap:wrap;\">\n      <div style=\"display:flex; align-items:center; gap:12px;\">\n        <div style=\"width:42px; height:42px; border-radius:12px; background:#2E9E6B; color:#fff; display:grid; place-items:center; font-weight:900; font-size:20px;\">م<\u002Fdiv>\n        <div>\n          <div style=\"font-weight:900; font-size:17px;\">دفتر مشاوره مسئول پایه<\u002Fdiv>\n          <div class=\"brandsub\" style=\"font-size:12px; color:#8A7A70;\">{{ schoolName }} · پایه یازدهم تجربی<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <nav class=\"topnav\" style=\"display:flex; gap:8px; margin-inline-start:auto; flex-wrap:wrap;\">\n        <button onclick=\"{{ goDash }}\" style=\"border:none; cursor:pointer; font-family:inherit; font-size:14px; font-weight:700; padding:9px 16px; border-radius:999px; background:{{ navDashBg }}; color:{{ navDashFg }};\">میز کار<\u002Fbutton>\n        <button onclick=\"{{ goStudents }}\" style=\"border:none; cursor:pointer; font-family:inherit; font-size:14px; font-weight:700; padding:9px 16px; border-radius:999px; background:{{ navStuBg }}; color:{{ navStuFg }};\">دانش‌آموزان<\u002Fbutton>\n        <button onclick=\"{{ goReport }}\" style=\"border:none; cursor:pointer; font-family:inherit; font-size:14px; font-weight:700; padding:9px 16px; border-radius:999px; background:{{ navRepBg }}; color:{{ navRepFg }};\">گزارش ماهانه<\u002Fbutton>\n        <button onclick=\"{{ goNew }}\" style=\"border:none; cursor:pointer; font-family:inherit; font-size:14px; font-weight:900; padding:9px 20px; border-radius:999px; background:#2A9D8F; color:#fff; box-shadow:0 3px 0 #1F776D;\">+ ثبت جلسه<\u002Fbutton>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main class=\"appmain\" style=\"max-width:1060px; margin:0 auto; padding:24px 20px 80px;\">\n\n    <!-- ======= Dashboard ======= -->\n    <sc-if value=\"{{ isDash }}\" hint-placeholder-val=\"{{ true }}\">\n      <section data-screen-label=\"میز کار\">\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px;\">\n          <div style=\"background:#fff; border-radius:16px; padding:18px; border:1px solid #F3E3D3;\">\n            <div style=\"font-size:13px; color:#8A7A70; font-weight:700;\">جلسات ۷ روز اخیر<\u002Fdiv>\n            <div style=\"font-size:34px; font-weight:900; color:#F2695C;\">{{ weekCount }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff; border-radius:16px; padding:18px; border:1px solid #F3E3D3;\">\n            <div style=\"font-size:13px; color:#8A7A70; font-weight:700;\">جلسات ۳۰ روز اخیر<\u002Fdiv>\n            <div style=\"font-size:34px; font-weight:900; color:#2A9D8F;\">{{ monthCount }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff; border-radius:16px; padding:18px; border:1px solid #F3E3D3;\">\n            <div style=\"font-size:13px; color:#8A7A70; font-weight:700;\">نیازمند پیگیری<\u002Fdiv>\n            <div style=\"font-size:34px; font-weight:900; color:#E15554;\">{{ followCount }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff; border-radius:16px; padding:18px; border:1px solid #F3E3D3;\">\n            <div style=\"font-size:13px; color:#8A7A70; font-weight:700;\">کل دانش‌آموزان<\u002Fdiv>\n            <div style=\"font-size:34px; font-weight:900; color:#F4B942;\">{{ studentCount }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"no-print\" style=\"margin-top:16px; background:#EAF3FB; border:1px solid #D3E5F2; border-radius:16px; padding:14px 18px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;\">\n          <div style=\"flex:1; min-width:180px;\">\n            <div style=\"font-weight:900; font-size:14px; color:#2E6DA4;\">💾 پشتیبان‌گیری از جلسه‌ها<\u002Fdiv>\n            <div style=\"font-size:12px; color:#5E7A94; line-height:1.8;\">{{ backupHint }}<\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ backupNow }}\" style=\"border:none; cursor:pointer; font-family:inherit; font-size:13px; font-weight:800; padding:10px 18px; border-radius:999px; background:#2E6DA4; color:#fff;\">📥 ذخیره فایل پشتیبان<\u002Fbutton>\n          <label style=\"cursor:pointer; font-family:inherit; font-size:13px; font-weight:800; padding:10px 18px; border-radius:999px; background:#fff; color:#2E6DA4; border:1px solid #B9D4EC;\">\n            📤 بازیابی از فایل\n            <input type=\"file\" accept=\"application/json,.json\" onchange=\"{{ restoreFile }}\" style=\"display:none;\">\n          <\u002Flabel>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:16px; margin-top:18px; align-items:start;\">\n          <!-- follow-ups -->\n          <div style=\"background:#fff; border-radius:16px; border:1px solid #F3E3D3; overflow:hidden;\">\n            <div style=\"padding:14px 18px; font-weight:900; font-size:15px; background:#FDEBE4; color:#C2432F;\">پیگیری‌های باز<\u002Fdiv>\n            <sc-if value=\"{{ hasFollowUps }}\" hint-placeholder-val=\"{{ true }}\">\n              <sc-for list=\"{{ followUps }}\" as=\"f\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex; align-items:center; gap:12px; padding:12px 18px; border-top:1px solid #FBF0E6;\">\n                  <div style=\"flex:1; min-width:0;\">\n                    <a href=\"#\" onclick=\"{{ f.open }}\" style=\"font-weight:800; font-size:14px; color:#3A2E2A; text-decoration:none;\">{{ f.name }}<\u002Fa>\n                    <div style=\"font-size:12px; color:#8A7A70;\">{{ f.topic }} · {{ f.dateFa }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <button onclick=\"{{ f.resolve }}\" style=\"border:1px solid #2A9D8F; color:#2A9D8F; background:#fff; border-radius:999px; padding:5px 14px; font-family:inherit; font-size:12px; font-weight:700; cursor:pointer;\">انجام شد ✓<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noFollowUps }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:24px 18px; font-size:13px; color:#8A7A70;\">پیگیری بازی وجود ندارد. آفرین!<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <!-- top topics -->\n          <div style=\"background:#fff; border-radius:16px; border:1px solid #F3E3D3; overflow:hidden;\">\n            <div style=\"padding:14px 18px; font-weight:900; font-size:15px; background:#E7F4F1; color:#1F776D;\">موضوعات پرتکرار (۳۰ روز)<\u002Fdiv>\n            <div style=\"padding:14px 18px; display:flex; flex-direction:column; gap:12px;\">\n              <sc-for list=\"{{ topTopics }}\" as=\"t\" hint-placeholder-count=\"4\">\n                <div>\n                  <div style=\"display:flex; justify-content:space-between; font-size:13px; font-weight:700; margin-bottom:4px;\">\n                    <span>{{ t.label }}<\u002Fspan><span style=\"color:#8A7A70;\">{{ t.countFa }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"height:10px; border-radius:999px; background:#FBF0E6;\">\n                    <div style=\"height:10px; border-radius:999px; background:#F4B942; width:{{ t.pct }}%;\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- recent sessions -->\n        <div style=\"background:#fff; border-radius:16px; border:1px solid #F3E3D3; margin-top:18px; overflow:hidden;\">\n          <div style=\"padding:14px 18px; font-weight:900; font-size:15px; border-bottom:1px solid #FBF0E6;\">آخرین جلسات<\u002Fdiv>\n          <sc-for list=\"{{ recentSessions }}\" as=\"s\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex; align-items:center; gap:12px; padding:12px 18px; border-top:1px solid #FBF0E6;\">\n              <span style=\"width:12px; height:12px; border-radius:50%; background:{{ s.moodColor }}; flex-shrink:0;\" title=\"{{ s.moodLabel }}\"><\u002Fspan>\n              <div style=\"flex:1; min-width:0;\">\n                <a href=\"#\" onclick=\"{{ s.open }}\" style=\"font-weight:800; font-size:14px; color:#3A2E2A; text-decoration:none;\">{{ s.name }}<\u002Fa>\n                <div style=\"font-size:12px; color:#8A7A70;\">{{ s.typeLabel }} · {{ s.topicsText }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:12px; color:#8A7A70; flex-shrink:0;\">{{ s.dateFa }}<\u002Fdiv>\n              <button onclick=\"{{ s.sheet }}\" style=\"border:1px solid #F2695C; color:#F2695C; background:#fff; border-radius:999px; padding:5px 14px; font-family:inherit; font-size:12px; font-weight:700; cursor:pointer; flex-shrink:0;\">گزارش<\u002Fbutton>\n              <button onclick=\"{{ s.del }}\" title=\"حذف جلسه\" style=\"border:1px solid #E4D9CB; color:#B0A090; background:#fff; border-radius:999px; padding:5px 11px; font-family:inherit; font-size:13px; cursor:pointer; flex-shrink:0;\">🗑<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ======= New Session ======= -->\n    <sc-if value=\"{{ isNew }}\" hint-placeholder-val=\"{{ false }}\">\n      <section data-screen-label=\"ثبت جلسه\" style=\"max-width:760px; margin:0 auto;\">\n        <h1 style=\"font-size:22px; font-weight:900; margin:0 0 4px;\">{{ newTitle }}<\u002Fh1>\n        <p style=\"font-size:13px; color:#8A7A70; margin:0 0 20px;\">فقط بزن روی گزینه‌ها — نوشتن اختیاریه.<\u002Fp  overflow:hidden;\">\n              <div style=\"background:#EAF3FB; color:#3D7EB8; font-weight:900; font-size:13px; padding:8px 14px; display:flex; align-items:center; gap:7px;\"><span>🗓️<\u002Fspan>اطلاعات جلسه<\u002Fdiv>\n              <div style=\"padding:10px 14px; font-size:13px; display:flex; flex-direction:column; gap:6px;\">\n                <div><span style=\"color:#8A9A8E;\">روز و تاریخ: <\u002Fspan><b>{{ sheetDateFa }}<\u002Fb><\u002Fdiv>\n                <div><span style=\"color:#8A9A8E;\">نوع جلسه: <\u002Fspan><b>{{ sheetType }}<\u002Fb><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff; border:1px solid #F5DADA; border-radius:14px; overflow:hidden;\">\n              <div style=\"background:#FDECEC; color:#C25555; font-weight:900; font-size:13px; padding:8px 14px; display:flex; align-items:center; gap:7px;\"><span>🔖<\u002Fspan>شماره گزارش و وضعیت<\u002Fdiv>\n              <div style=\"padding:10px 14px; font-size:13px; display:flex; flex-direction:column; gap:6px;\">\n                <div><span style=\"color:#8A9A8E;\">شماره: <\u002Fspan><b>{{ sheetNo }}<\u002Fb><\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:7px;\"><span style=\"color:#8A9A8E;\">حال دانش‌آموز:<\u002Fspan><span style=\"width:11px; height:11px; border-radius:50%; background:{{ sheetMoodColor }};\"><\u002Fspan><b>{{ sheetMood }}<\u002Fb><\u002Fdiv>\n                <sc-if value=\"{{ sheetHasRank }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex; align-items:center; gap:7px;\"><span style=\"color:#8A9A8E;\">رتبه کلی:<\u002Fspan><b style=\"font-size:15px; background:{{ sheetRankColor }}; color:#fff; border-radius:8px; padding:1px 10px;\">{{ sheetRank }}<\u002Fb><\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ sheetHasRatings }}\" hint-placeholder-val=\"{{ false }}\">\n       <div style=\"background:#FFF9EB; border:1px solid #F0E3C8; border-radius:12px; padding:10px 14px;\">\n                <div style=\"font-size:12px; font-weight:900; color:#B08514; margin-bottom:6px;\">⚠️ چالش‌ها و نکات قابل توجه<\u002Fdiv>\n                <sc-for list=\"{{ sheetAnalysis.challenges }}\" as=\"c\" hint-placeholder-count=\"1\">\n                  <div style=\"font-size:12px; line-height:1.9; margin-bottom:4px;\">{{ c.t }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"background:#F2FAF4; border:1px solid #D9EDE0; border-radius:12px; padding:10px 14px;\">\n                <div style=\"font-size:12px; font-weight:900; color:#2E7D53; margin-bottom:6px;\">➕ نقاط قوت<\u002Fdiv>\n                <sc-for list=\"{{ sheetAnalysis.strengths }}\" as=\"c\" hint-placeholder-count=\"1\">\n                  <div style=\"font-size:12px; line-height:1.9; margin-bottom:4px;\">{{ c.t }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"background:#F8F4FD; border:1px solid #E7E0F0; border-radius:12px; padding:10px 14px;\">\n                <div style=\"font-size:12px; font-weight:900; color:#8E6CC9; margin-bottom:6px;\">💡 پیشنهادات و اقدامات بعدی<\u002Fdiv>\n                <sc-for list=\"{{ sheetAnalysis.suggestions }}\" as=\"c\" hint-placeholder-count=\"1\">\n                  <div style=\"font-size:12px; line-height:1.9; margin-bottom:4px;\">{{ c.t }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"position:relative; background:#fff; border:1px solid #E5DCF2; border-radius:14px; overflow:hidden; margin-top:14px;\">\n            <div style=\"background:#F3EDFB; color:#8E6CC9; font-weight:900; font-size:13px; padding:8px 14px; display:flex; align-items:center; gap:7px;\"><span>🖊️<\u002Fspan>نظر مدیریت و معاون آموزشی<\u002Fdiv>\n            <div style=\"padding:12px 14px;\">\n              <textarea class=\"no-print\" value=\"{{ sheetAdminComment }}\" onchange=\"{{ setAdminComment }}\" rows=\"2\" placeholder=\"در نسخه دیجیتال اینجا تایپ کنید؛ در نسخه چاپی، خطوط زیر برای نوشتن دستی است.\" style=\"width:100%; box-sizing:border-box; padding:10px 14px; border-radius:10px; border:2px solid #E5DCF2; font-family:inherit; font-size:13px; background:#FDFBFF; resize:vertical; margin-bottom:8px;\"><\u002Ftextarea>\n              <div style=\"font-size:13px; line-height:2.6; min-height:70px; padding:0 2px; background:repeating-linear-gradient(to bottom, transparent, transparent 33px, #EDE5F7 33px, #EDE5F7 34px);\">{{ sheetAdminCommentPrint }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"position:relative; display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:22px; text-align:center;\">\n            <div style=\"background:#fff; border:1.5px dashed #B7D6C2; border-radius:12px; padding:12px 8px 18px; font-size:12px; color:#6E8377;\">امضای مسئول پایه<br><b style=\"color:#2E7D53;\">{{ counselorName }}<\u002Fb><\u002Fdiv>\n            <div style=\"background:#fff; border:1.5px dashed #B7D6C2; border-radius:12px; padding:12px 8px 18px; font-size:12px; color:#6E8377;\">امضای معاون آموزشی<\u002Fdiv>\n            <div style=\"background:#fff; border:1.5px dashed #B7D6C2; border-radius:12px; padding:12px 8px 18px; font-size:12px; color:#6E8377;\">امضای مدیریت<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ======= Monthly report (printable) ======= -->\n    <sc-if value=\"{{ isReport }}\" hint-placeholder-val=\"{{ false }}\">\n      <section data-screen-label=\"گزارش ماهانه\">\n        <div class=\"no-print\" style=\"display:flex; gap:10px; margin-bottom:14px; align-items:center;\">\n          <h1 style=\"font-size:22px; font-weight:900; margin:0; flex:1;\">گزارش ۳۰ روز اخیر<\u002Fh1>\n          <button onclick=\"{{ printPage }}\" style=\"border:none; cursor:pointer; font-family:inherit; font-size:14px; font-weight:900; padding:10px 24px; border-radius:999px; background:#2E9E6B; color:#fff;\">چاپ / ذخیره PDF<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div class=\"print-sheet\" style=\"background:#fff; border-radius:16px; box-shadow:0 8px 30px rgba(60,40,20,0.10); max-width:794px; margin:0 auto; padding:clamp(18px,5vw,44px); box-sizing:border-box;\">\n          <div style=\"display:flex; align-items:center; gap:14px; border-bottom:3px solid #2A9D8F; padding-bottom:14px;\">\n            <div style=\"width:46px; height:46px; border-radius:12px; background:#2A9D8F; color:#fff; display:grid; place-items:center; font-weight:900; font-size:22px;\">گ<\u002Fdiv>\n            <div style=\"flex:1;\">\n              <div style=\"font-weight:900; font-size:18px;\">گزارش ماهانه مشاوره پایه — ویژه مدیریت<\u002Fdiv>\n              <div style=\"font-size:12px; color:#8A7A70;\">{{ schoolName }} · پایه یازدهم تجربی · مسئول پایه: {{ counselorName }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"text-align:left; font-size:12px; color:#8A7A70;\">تاریخ گزارش<br><b style=\"font-size:13px; color:#3A2E2A;\">{{ todayFa }}<\u002Fb><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:18px;\">\n            <div style=\"background:#FFF7EE; border-radius:12px; padding:14px; text-align:center;\"><div style=\"font-size:26px; font-weight:900; color:#F2695C;\">{{ monthCount }}<\u002Fdiv><div style=\"font-size:12px; color:#8A7A70; font-weight:700;\">جلسه برگزار شد<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#FFF7EE; border-radius:12px; padding:14px; text-align:center;\"><div style=\"font-size:26px; font-weight:900; color:#2A9D8F;\">{{ monthStudentCount }}<\u002Fdiv><div style=\"font-size:12px; color:#8A7A70; font-weight:700;\">دانش‌آموز دیده شدند<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#FFF7EE; border-radius:12px; padding:14px; text-align:center;\"><div style=\"font-size:26px; font-weight:900; color:#E15554;\">{{ followCount }}<\u002Fdiv><div style=\"font-size:12px; color:#8A7A70; font-weight:700;\">پیگیری باز<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:20px;\">\n            <div style=\"font-weight:900; font-size:14px; color:#1F776D; margin-bottom:10px;\">موضوعات پرتکرار<\u002Fdiv>\n            <sc-for list=\"{{ topTopics }}\" as=\"t\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:8px;\">\n                <div style=\"width:150px; font-size:13px; font-weight:700; flex-shrink:0;\">{{ t.label }}<\u002Fdiv>\n                <div style=\"flex:1; height:12px; border-radius:999px; background:#FBF0E6;\"><div style=\"height:12px; border-radius:999px; background:#F4B942; width:{{ t.pct }}%;\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"width:26px; font-size:13px; color:#8A7A70;\">{{ t.countFa }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:20px;\">\n            <div style=\"font-weight:900; font-size:14px; color:#C2432F; margin-bottom:10px;\">دانش‌آموزان نیازمند پیگیری<\u002Fdiv>\n            <sc-if value=\"{{ hasFollowUps }}\" hint-placeholder-val=\"{{ false }}\">\n              <sc-for list=\"{{ followUps }}\" as=\"f\" hint-placeholder-count=\"2\">\n                <div style=\"font-size:13px; padding:6px 0; border-bottom:1px dashed #F3E3D3; display:flex; gap:10px;\"><b style=\"min-width:140px;\">{{ f.name }}<\u002Fb><span style=\"color:#8A7A70;\">{{ f.topic }} · {{ f.dateFa }}<\u002Fspan><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noFollowUps }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"font-size:13px; color:#8A7A70;\">مورد بازی وجود ندارد.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:20px;\">\n            <div style=\"font-weight:900; font-size:14px; color:#1F776D; margin-bottom:10px;\">جلسات این دوره به تفکیک دانش‌آموز<\u002Fdiv>\n            <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:4px 24px;\">\n              <sc-for list=\"{{ reportStudents }}\" as=\"r\" hint-placeholder-count=\"6\">\n                <div style=\"display:flex; justify-content:space-between; font-size:13px; padding:5px 0; border-bottom:1px dashed #F3E3D3;\">\n                  <span style=\"font-weight:700;\">{{ r.name }}<\u002Fspan><span style=\"color:#8A7A70;\">{{ r.countFa }} جلسه<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:30px; text-align:center;\">\n            <div style=\"border-top:2px solid #EAD9C8; padding-top:8px; font-size:12px; color:#8A7A70;\">امضای مسئول پایه<br><b style=\"color:#3A2E2A;\">{{ counselorName }}<\u002Fb><\u002Fdiv>\n            <div style=\"border-top:2px solid #EAD9C8; padding-top:8px; font-size:12px; color:#8A7A70;\">ملاحظات و امضای مدیر<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <!-- ======= Mobile bottom tab bar ======= -->\n  <nav class=\"bottomnav no-print\">\n    <button onclick=\"{{ goDash }}\" style=\"flex:1; border:none; background:none; cursor:pointer; font-family:inherit; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 2px; color:{{ tabDashColor }};\">\n      <span style=\"font-size:20px; line-height:1;\">🏠<\u002Fspan><span style=\"font-size:11px; font-weight:800;\">میز کار<\u002Fspan>\n    <\u002Fbutton>\n    <button onclick=\"{{ goStudents }}\" style=\"flex:1; border:none; background:none; cursor:pointer; font-family:inherit; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 2px; color:{{ tabStuColor }};\">\n      <span style=\"font-size:20px; line-height:1;\">👥<\u002Fspan><span style=\"font-size:11px; font-weight:800;\">دانش‌آموزان<\u002Fspan>\n    <\u002Fbutton>\n    <button onclick=\"{{ goNew }}\" style=\"flex:1; border:none; background:none; cursor:pointer; font-family:inherit; display:flex; flex-direction:column; align-items:center; gap:3px; padding:2px;\">\n      <span style=\"width:44px; height:44px; margin-top:-16px; border-radius:50%; background:#2E9E6B; color:#fff; display:flex; align-items:center; justify-content:center; font-size:26px; box-shadow:0 3px 10px rgba(46,158,107,0.4);\">+<\u002Fspan>\n      <span style=\"font-size:11px; font-weight:800; color:#2E9E6B;\">ثبت جلسه<\u002Fspan>\n    <\u002Fbutton>\n    <button onclick=\"{{ goReport }}\" style=\"flex:1; border:none; background:none; cursor:pointer; font-family:inherit; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 2px; color:{{ tabRepColor }};\">\n      <span style=\"font-size:20px; line-height:1;\">📊<\u002Fspan><span style=\"font-size:11px; font-weight:800;\">گزارش ماهانه<\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fnav>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;schoolName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;دبیرستان گلبانگ&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;مشخصات&quot;},&quot;counselorName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot; مسئول پایه یازدهم&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;مشخصات&quot;},&quot;showNotesOnReport&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;حریم خصوصی&quot;}}\">\nclass Component extends DCLogic {\n  TOPICS = ['افت درسی','برنامه‌ریزی مطالعه','اضطراب امتحان','انگیزه و هدف','کنکور و انتخاب رشته','خانوادگی','ارتباط با همسالان','حضور و غیاب','استفاده از موبایل','سلامت و خواب'];\n  TYPES = [ {id:'ind', label:'مشاوره فردی'}, {id:'par', label:'مشاوره با اولیا'}, {id:'both', label:'مشاوره دانش‌آموز و اولیا'} ];\n  MOODS = [ {id:1,label:'عالی',color:'#2E9E6B'}, {id:2,label:'خوب',color:'#7CB342'}, {id:3,label:'متوسط',color:'#F4B942'}, {id:4,label:'نگران',color:'#F28C38'}, {id:5,label:'نیازمند توجه جدی',color:'#E15554'} ];\n  ACTIONS = ['برنامه مطالعاتی داده شد','تماس با اولیا','ارجاع به مشاور مدرسه','پیگیری هفته آینده','هماهنگی با دبیر','تشویق و دلگرمی','تذکر'];\n  RATINGS = ['روحیه و انگیزه','تمرکز','مدیریت زمان','خواب و انرژی','همکاری خانواده'];\n  RANKS = [ {id:'A+',color:'#2E9E6B'}, {id:'A',color:'#4CAF50'}, {id:'B+',color:'#7CB342'}, {id:'B',color:'#C0CA33'}, {id:'C+',color:'#F4B942'}, {id:'C',color:'#F28C38'}, {id:'D',color:'#E15554'} ];\n  AVATARS = ['#F2695C','#2A9D8F','#F4B942','#8E7CC3','#F28C38','#5B9BD5'];\n  KEY = 'atomia-counsel-v2';\n  ROSTER = [\"مبینا اسدی غیاثوند\",\"الینا اسمعیل زاده رودسری\",\"پانیذ اعتباری\",\"گلاره الله یاری\",\"مایسا آقاجانى\",\"تارا تجدد\",\"ملیسا جامى\",\"پریا جبارپور\",\"پارمیس جعفری صرافی\",\"وانیا حسینی فرد\",\"ساینا سادات حسینی نژاد\",\"گلسانا حقیقی\",\"باران حمیدسمیعی\",\"آیلین خانبابایی\",\"آناهیتا خلیلی\",\"دریتا دشتی پور\",\"ایلین رادفر\",\"پارمیدا رحمانی\",\"آترینا رحمتی نژاد\",\"پانیا رزاق زاده\",\"سنا سیدی\",\"شایلین شیخ\",\"یگانه طالبی\",\"نگار طاهری\",\"ستایش عزیزی\",\"ساغر عنصری\",\"آناهیتا فکوری نیا\",\"نیالا قربانی\",\"دلسا کلانی\",\"دینا محمدی\",\"هستی مدنی\",\"پارمیدا مطهری\",\"نازنین زهرا مویدمحسنی\",\"ملینا میان بندی\",\"نیوشا نادرخانی\",\"ملینا نادری\",\"هستی ناطقی\",\"آندیا نصیری\",\"هانا هراتیان نژاد\"];\n\n  MONTHS = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];\n\n  g2j(gy,gm,gd){ const g=[0,31,59,90,120,151,181,212,243,273,304,334]; const gy2=(gm>2)?gy+1:gy; let days=355666+365*gy+Math.floor((gy2+3)/4)-Math.floor((gy2+99)/100)+Math.floor((gy2+399)/400)+gd+g[gm-1]; let jy=-1595+33*Math.floor(days/12053); days%=12053; jy+=4*Math.floor(days/1461); days%=1461; if(days>365){jy+=Math.floor((days-1)/365); days=(days-1)%365;} let jm,jd; if(days<186){jm=1+Math.floor(days/31); jd=1+days%31;} else {jm=7+Math.floor((days-186)/30); jd=1+(days-186)%30;} return [jy,jm,jd]; }\n  j2g(jy,jm,jd){ jy+=1595; let days=-355668+365*jy+Math.floor(jy/33)*8+Math.floor((jy%33+3)/4)+jd+((jm<7)?(jm-1)*31:(jm-7)*30+186); let gy=400*Math.floor(days/146097); days%=146097; if(days>36524){gy+=100*Math.floor(--days/36524); days%=36524; if(days>=365)days++;} gy+=4*Math.floor(days/1461); days%=1461; if(days>365){gy+=Math.floor((days-1)/365); days=(days-1)%365;} let gd=days+1; const sal=[0,31,((gy%4===0&&gy%100!==0)||gy%400===0)?29:28,31,30,31,30,31,31,30,31,30,31]; let gm; for(gm=0;gm<13&&gd>sal[gm];gm++) gd-=sal[gm]; return [gy,gm,gd]; }\n  todayJ(){ const d=new Date(); return this.g2j(d.getFullYear(), d.getMonth()+1, d.getDate()); }\n\n  normName(s){ return (s||'').replace(/[يى]/g,'ی').replace(/ك/g,'ک').replace(/[\\u0653\\u0654]/g,'').replace(/آ/g,'ا').replace(/[\\s\\u200c]+/g,''); }\n  gradesFor(name){\n    const G = this.state.grades; if(!G) return null;\n    const n = this.normName(name);\n    for (const key of Object.keys(G)) {\n      const k = this.normName(key);\n      if (n === k || n.startsWith(k) || k.startsWith(n)) return G[key];\n    }\n    return null;\n  }\n  topsBySubject(){\n    if (this._tops) return this._tops;\n    const G = this.state.grades; if(!G) return {};\n    const t = {};\n    for (const key of Object.keys(G)) for (const s of G[key]) {\n      if (!s.exams.length) continue;\n      const avg = s.exams.reduce((a,e)=>a+e[1],0)/s.exams.length;\n      if (!(s.subject in t) || avg > t[s.subject]) t[s.subject] = avg;\n    }\n    this._tops = t; return t;\n  }\n  gradeRows(name){\n    const subs = this.gradesFor(name); if(!subs) return [];\n    const tops = this.topsBySubject();\n    return subs.map(s=>{\n      const sAvg = s.exams.reduce((a,e)=>a+e[1],0)/s.exams.length;\n      const withC = s.exams.filter(e=>e[2]!=null);\n      const cAvg = withC.length ? withC.reduce((a,e)=>a+e[2],0)/withC.length : 0;\n      const tAvg = tops[s.subject] || 0;\n      const max = Math.max(sAvg, cAvg, tAvg, 0.01);\n      return { subject:s.subject, examCountFa:this.fa(s.exams.length),\n        sVal:sAvg.toLocaleString('fa-IR',{maximumFractionDigits:1}),\n        cVal:cAvg.toLocaleString('fa-IR',{maximumFractionDigits:1}),\n        tVal:tAvg.toLocaleString('fa-IR',{maximumFractionDigits:1}),\n        sPct:Math.round(sAvg/max*100), cPct:Math.round(cAvg/max*100), tPct:Math.round(tAvg/max*100),\n        better: sAvg >= cAvg };\n    });\n  }\n\n  copyRows(rows, key){\n    const tsv = rows.map(r=>r.map(c=>String(c??'').replace(/\\t/g,' ')).join('\\t')).join('\\n');\n    navigator.clipboard.writeText(tsv).then(()=>{\n      this.setState({copied:key});\n      clearTimeout(this._ct); this._ct = setTimeout(()=>this.setState({copied:''}), 2500);\n    });\n  }\n  downloadCsv(rows, name){\n    const csv = '\\ufeff' + rows.map(r=>r.map(c=>'\"'+String(c??'').replace(/\"/g,'\"\"')+'\"').join(',')).join('\\n');\n    const a = document.createElement('a');\n    a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8'}));\n    a.download = name + '.csv'; a.click();\n  }\n  studentReportRows(stu){\n    const sessions = this.state.sessions.filter(x=>x.studentId===stu.id).sort((a,b)=>new Date(a.date)-new Date(b.date));\n    const rows = [];\n    rows.push(['گزارش مشاوره دانش‌آموز', stu.name]);\n    rows.push(['پایه', 'یازدهم تجربی']);\n    rows.push(['تاریخ تهیه گزارش', this.fmt(new Date().toISOString())]);\n    rows.push([]);\n    rows.push(['ردیف','روز و تاریخ','نوع جلسه','موضوعات','اقدامات','حال دانش‌آموز','یادداشت مسئول پایه','پیگیری']);\n    sessions.forEach((s,i)=>rows.push([this.fa(i+1), this.fmt(s.date), this.typeOf(s.type), s.topics.join('، '), s.actions.join('، '), this.moodOf(s.mood).label, s.note||'', s.follow?'دارد':'—']));\n e, stuDriveDone:true}); clearTimeout(this._st); this._st=setTimeout(()=>this.setState({stuDriveDone:false}),4000); })\n            .catch(()=>{ this.setState({stuDriveSaving:false}); alert('ذخیره در درایو ناموفق بود. آدرس اسکریپت را بررسی کن.'); });\n        }, 120));\n      },\n      copyRepSheet:()=>this.copyRows(this.monthlyReportRows(), 'rep'),\n      dlRepCsv:()=>this.downloadCsv(this.monthlyReportRows(), 'گزارش ماهانه مشاوره'),\n\n      exportJson:()=>{\n        const blob = new Blob([JSON.stringify({platform:'atomia', exportedAt:new Date().toISOString(), grade:'یازدهم تجربی', students:S.students, sessions:S.sessions}, null, 2)], {type:'application/json'});\n        const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='counseling-data.json'; a.click();\n      },\n\n      backupHint: (()=>{\n        const n = S.sessions.length;\n        if (!n) return 'هنوز جلسه‌ای ثبت نشده. بعد از ثبت، یک فایل پشتیبان بگیر و جای امن نگه دار.';\n        return this.fa(n) + ' جلسه ثبت شده. توصیه: هر چند وقت یک‌بار فایل پشتیبان بگیر تا اگر گوشی عوض شد یا داده پاک شد، برشان گردانی.';\n      })(),\n      backupNow:()=>{\n        const data = { app:'atomia-counsel', backupAt:new Date().toISOString(), students:S.students, sessions:S.sessions };\n        const stamp = (()=>{ const j=this.todayJ(); return j[0]+'-'+j[1]+'-'+j[2]; })();\n        const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});\n        const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='پشتیبان مشاوره '+stamp+'.json'; a.click();\n      },\n      restoreFile:(e)=>{\n        const file = e.target.files && e.target.files[0]; if(!file) return;\n        const reader = new FileReader();\n        reader.onload = () => {\n          try {\n            const d = JSON.parse(reader.result);\n            if (!d || !Array.isArray(d.sessions)) { alert('فایل پشتیبان معتبر نیست.'); return; }\n            const cnt = d.sessions.length;\n            if (!confirm('بازیابی '+this.fa(cnt)+' جلسه از فایل پشتیبان؟\\nجلسه‌های فعلی با محتوای فایل جایگزین می‌شود.')) return;\n            this.persist({ students: (Array.isArray(d.students)&&d.students.length)?d.students:S.students, sessions:d.sessions });\n            alert('بازیابی انجام شد ✓ ('+this.fa(cnt)+' جلسه)');\n          } catch(err){ alert('خطا در خواندن فایل: '+err); }\n        };\n        reader.readAsText(file);\n        e.target.value = '';\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
